<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <title>고창군 오늘 기온(예보)</title>
</head>
<body>
  <div class="mermaid">
xychart-beta
  title "고창군 오늘 기온(예보)"
  x-axis ["09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00", "20:00", "21:00", "22:00", "23:00"]
  y-axis "℃"
  line [10.0, 13.0, 16.0, 17.0, 18.0, 19.0, 18.0, 18.0, 17.0, 15.0, 12.0, 10.0, 10.0, 9.0, 8.0]
  </div>
  <script>
    try {
      mermaid.initialize({ startOnLoad: true, securityLevel: 'loose' });
    } catch(e) {
      document.body.innerHTML = "<h3>Mermaid init failed</h3><pre>" + String(e) + "</pre>";
    }
  </script>
</body>
</html>
